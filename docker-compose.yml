version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: dd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deploymentdoctor
      POSTGRES_PASSWORD: dd_secure_2024
      POSTGRES_DB: deployment_doctor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploymentdoctor -d deployment_doctor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dd-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://deploymentdoctor:dd_secure_2024@db:5432/deployment_doctor
      ENGINE_VERSION: "1.6.0"
      BLUEPRINT_VERSION: "1.0.0"
      CORS_ORIGINS: "*"
      OPENROUTER_API_KEY: ""
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dd-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
